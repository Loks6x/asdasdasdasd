<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тугай ТТК">
    <title>Тугай ТТК</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-search: #1C1C1E;
            --accent: #0A84FF;
            --accent-pf: #30D158;
            --accent-danger: #FF453A;
            --accent-warning: #FF9F0A;
            --text-main: #FFFFFF;
            --text-sec: #EBEBF599;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; margin: 10px 0 25px; text-align: center; }

        .controls {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px;
            margin-bottom: 24px; position: sticky; top: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: var(--glass-blur); padding: 10px 0 15px;
        }

        .segment-control { display: flex; background: var(--bg-search); border-radius: 12px; padding: 4px; }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-sec); padding: 10px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255, 255, 255, 0.15); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .search-bar {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-search); color: white; font-size: 16px; outline: none; transition: border 0.2s;
        }
        .search-bar:focus { border-color: var(--accent); }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-pill {
            background: var(--bg-search); border: 1px solid var(--border-color); color: var(--text-sec);
            padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); border-color: var(--text-main); }

        .content-container { width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; width: 100%; }

        .card {
            background: var(--bg-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: background 0.3s, transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 19px; font-weight: 600; margin: 0; color: var(--text-main); line-height: 1.2; }
        .chevron { color: var(--text-sec); transition: transform 0.3s ease; font-size: 14px; }
        .card.open .chevron { transform: rotate(180deg); }
        .card-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; }
        .card-content-inner { overflow: hidden; }
        .card.open .card-content { grid-template-rows: 1fr; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }

        .tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text-sec); }
        .section-title { color: var(--text-sec); font-size: 13px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .method { font-size: 15px; line-height: 1.5; color: var(--text-main); margin-bottom: 10px; }
        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 15px; line-height: 1.6;}
        li { margin-bottom: 4px; }

        .calc-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            background: rgba(48, 209, 88, 0.1); padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(48, 209, 88, 0.3);
        }
        .calc-label { font-size: 14px; color: var(--accent-pf); font-weight: 600; }
        .calc-input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff;
            padding: 6px 10px; border-radius: 8px; width: 80px; font-size: 16px; font-weight: 600; text-align: center; outline: none;
        }
        .calc-input:focus { border-color: var(--accent-pf); }
        .pf-ing-amount { font-weight: 700; color: var(--accent-pf); transition: color 0.2s;}

        /* Стили чек-листа */
        #checklist-container { display: none; width: 100%; flex-direction: column; gap: 16px; }
        .cl-input-group { display: flex; gap: 10px; }
        .cl-input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-search); color: white; font-size: 16px; outline: none; }
        .cl-input:focus { border-color: var(--accent); }
        .cl-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .cl-list { display: flex; flex-direction: column; gap: 10px; }
        .cl-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .cl-item.done { opacity: 0.6; }
        .cl-item.done .cl-text { text-decoration: line-through; color: var(--text-sec); }
        .cl-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-sec); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .cl-item.done .cl-checkbox { background: var(--accent); border-color: var(--accent); }
        .cl-item.done .cl-checkbox::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        .cl-text { flex: 1; font-size: 16px; word-break: break-word; cursor: pointer; }
        .cl-delete { background: rgba(255, 69, 58, 0.15); color: var(--accent-danger); border: none; width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; }

        /* СТИЛИ МОДУЛЯ ЗАЯВОК */
        #orders-container { display: none; width: 100%; flex-direction: column; gap: 20px; }
        .order-form { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .order-form-title { font-size: 18px; font-weight: 600; margin: 0 0 5px 0; }
        .order-row { display: flex; gap: 10px; }
        .order-input { flex: 2; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-base); color: white; font-size: 15px; outline: none; }
        .order-input.small { flex: 1; }
        .order-input:focus { border-color: var(--accent); }
        .btn-add-order { background: var(--accent-pf); color: black; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-add-order:active { transform: scale(0.98); }
        .btn-send-now { background: rgba(255, 159, 10, 0.2); color: var(--accent-warning); border: 1px solid var(--accent-warning); padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-send-now:active { background: var(--accent-warning); color: black; }
        
        .order-list { display: flex; flex-direction: column; gap: 10px; }
        .order-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); }
        .order-info { display: flex; flex-direction: column; gap: 4px; flex: 1;}
        .order-title { font-size: 16px; font-weight: 600; }
        .order-meta { font-size: 13px; color: var(--text-sec); display: flex; gap: 8px; flex-wrap: wrap;}
        .order-author { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* Модальное окно (Представьтесь) */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #1C1C1E; width: 90%; max-width: 320px; border-radius: 20px; padding: 24px; text-align: center; border: 1px solid var(--border-color); }
        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        .modal-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: black; color: white; font-size: 16px; margin-bottom: 15px; outline: none; text-align: center; }
        .modal-btn { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }

        #install-btn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: black; border: none; padding: 12px 24px; border-radius: 20px;
            font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Тугай ТТК</h1>
    
    <div class="controls">
        <div class="segment-control">
            <button id="btn-drinks" class="tab-btn active" onclick="switchTab('drinks')">Напитки</button>
            <button id="btn-pf" class="tab-btn" onclick="switchTab('pf')">ПФ</button>
            <button id="btn-checklist" class="tab-btn" onclick="switchTab('checklist')">Чек-лист</button>
            <button id="btn-orders" class="tab-btn" onclick="switchTab('orders')">Заявки</button>
        </div>
        
        <input type="text" id="search" class="search-bar" placeholder="Поиск (название, состав)..." onkeyup="filterCards()">
        
        <div class="filters" id="drink-filters">
            <div class="filter-pill active" onclick="setFilter('all', this)">Все</div>
            <div class="filter-pill" onclick="setFilter('cocktail', this)">Коктейли</div>
            <div class="filter-pill" onclick="setFilter('lemonade', this)">Лимонады</div>
            <div class="filter-pill" onclick="setFilter('smoothie', this)">Смузи</div>
            <div class="filter-pill" onclick="setFilter('nonalk', this)">Б/А</div>
            <div class="filter-pill" onclick="setFilter('tea_coffee', this)">Чай / Кофе</div>
        </div>
    </div>

    <div class="content-container">
        <!-- ТТК Контейнер -->
        <div class="grid" id="cards-container"></div>

        <!-- Чек-лист Контейнер -->
        <div id="checklist-container">
            <div class="cl-input-group">
                <input type="text" id="new-task" class="cl-input" placeholder="Добавить задачу..." onkeypress="handleTaskEnter(event)">
                <button class="cl-btn" onclick="addTask()">Плюс</button>
            </div>
            <div class="cl-list" id="task-list"></div>
        </div>

        <!-- Заявки Контейнер -->
        <div id="orders-container">
            <button class="btn-send-now" onclick="sendOrdersNow()">🚀 Отправить закупщику прямо сейчас</button>
            
            <div class="order-form">
                <h3 class="order-form-title">Добавить позицию</h3>
                <div class="order-row">
                    <input type="text" id="ord-name" class="order-input" placeholder="Название (напр. Мята)">
                    <input type="text" id="ord-qty" class="order-input small" placeholder="Кол-во (напр. 3 кг)">
                </div>
                <input type="text" id="ord-comment" class="order-input" placeholder="Комментарий (необязательно)">
                <button class="btn-add-order" onclick="submitOrder()">Добавить в общий список</button>
            </div>

            <div class="order-list" id="active-orders-list">
                <!-- Сюда подгружаются заявки с сервера -->
                <p style="color:var(--text-sec); text-align:center;">Загрузка заявок...</p>
            </div>
        </div>
    </div>

    <button id="install-btn">Установить приложение</button>

    <!-- Модальное окно авторизации для заявок -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <div class="modal-title">Представьтесь, пожалуйста</div>
            <input type="text" id="author-name-input" class="modal-input" placeholder="Ваше Имя">
            <button class="modal-btn" onclick="saveAuthorName()">Продолжить</button>
        </div>
    </div>

    <script>
        // ВНИМАНИЕ: УКАЖИ ЗДЕСЬ АДРЕС ТВОЕГО СЕРВЕРА С PYTHON! 
        // Если тестируешь на одном компе, оставь localhost.
        const API_BASE_URL = ""; 
        
        // --- БАЗА ДАННЫХ ТТК (Укорочена для примера, у тебя уже есть полная в исходнике) ---
        const data = {
            drinks: [
                { category: "cocktail", name: "Апероль Спритц", glass: "Бокал", volume: "220 мл", ingredients: ["Aperol - 60 мл", "Содовая - 30 мл", "Игристое - 100 мл", "Апельсин - 30 гр"], method: "В бокал со льдом, перемешать." },
                // ... (Сюда вставь весь свой оригинальный массив drinks и pf)
            ],
            pf: [
                { name: "Пф Микс кислот", baseVol: 1000, ingredients: ["Лимонная к-та - 16 гр", "Вода - 1000 мл"], method: "Смешать." }
            ]
        };

        // --- ЛОГИКА ВКЛАДОК И ТТК ---
        let currentCategory = 'drinks';
        let currentFilter = 'all';
        let orderSyncInterval = null;

        const cardsContainer = document.getElementById('cards-container');
        const checklistContainer = document.getElementById('checklist-container');
        const ordersContainer = document.getElementById('orders-container');
        const searchInput = document.getElementById('search');
        const filtersDiv = document.getElementById('drink-filters');

        function renderCards() {
            // (Тут твой оригинальный код отрисовки карточек)
            cardsContainer.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            let items = data[currentCategory] || [];
            if (currentCategory === 'drinks' && currentFilter !== 'all') { items = items.filter(item => item.category === currentFilter); }
            const filteredItems = items.filter(item => (item.name + " " + item.ingredients.join(" ") + " " + (item.method||"")).toLowerCase().includes(query));

            if(filteredItems.length === 0) { cardsContainer.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%;">Ничего не найдено</p>'; return; }

            filteredItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                let tagsHtml = `<div class="tags">${item.glass ? `<span class="tag">🍸 ${item.glass}</span>` : ''}${item.volume && item.volume !== "-" ? `<span class="tag">💧 ${item.volume}</span>` : ''}</div>`;
                
                let calcHtml = ''; let ingListHtml = '';
                if (currentCategory === 'pf' && item.baseVol) {
                    calcHtml = `<div class="calc-row" onclick="event.stopPropagation()"><span class="calc-label">Объем:</span><input type="number" class="calc-input" id="calc-${index}" value="${item.baseVol}" data-base="${item.baseVol}" oninput="updateMath(${index})"></div>`;
                    ingListHtml = item.ingredients.map((ing, i) => {
                        const match = ing.match(/(.+) - ([\d.,]+)\s*(.+)?/);
                        if(match) return `<li>${match[1]} - <span id="ing-${index}-${i}" class="pf-ing-amount" data-base="${parseFloat(match[2].replace(',','.'))}">${match[2]}</span> ${match[3]||''}</li>`;
                        return `<li>${ing}</li>`;
                    }).join('');
                } else { ingListHtml = item.ingredients.map(ing => `<li>${ing}</li>`).join(''); }

                card.innerHTML = `<div class="card-header"><h3 class="card-title">${item.name}</h3><span class="chevron">▼</span></div><div class="card-content"><div class="card-content-inner">${(item.glass || item.volume) ? tagsHtml : ''}${calcHtml}<div class="section-title">Состав:</div><ul>${ingListHtml}</ul><div class="section-title">Технология:</div><div class="method">${item.method}</div></div></div>`;
                card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
                cardsContainer.appendChild(card);
            });
        }

        window.updateMath = function(idx) {
            const el = document.getElementById(`calc-${idx}`);
            const ratio = (parseFloat(el.value) || 0) / parseFloat(el.getAttribute('data-base'));
            document.querySelectorAll(`[id^="ing-${idx}-"]`).forEach(span => {
                const newAmt = parseFloat(span.getAttribute('data-base')) * ratio;
                span.innerText = Number.isInteger(newAmt) ? newAmt : newAmt.toFixed(1);
            });
        };

        function switchTab(category) {
            currentCategory = category;
            document.getElementById('btn-drinks').classList.toggle('active', category === 'drinks');
            document.getElementById('btn-pf').classList.toggle('active', category === 'pf');
            document.getElementById('btn-checklist').classList.toggle('active', category === 'checklist');
            document.getElementById('btn-orders').classList.toggle('active', category === 'orders');
            
            cardsContainer.style.display = 'none';
            checklistContainer.style.display = 'none';
            ordersContainer.style.display = 'none';
            filtersDiv.style.display = 'none';
            searchInput.style.display = 'none';

            clearInterval(orderSyncInterval); // Очищаем интервал опроса

            if (category === 'checklist') {
                checklistContainer.style.display = 'flex';
                renderChecklist();
            } else if (category === 'orders') {
                ordersContainer.style.display = 'flex';
                checkAuthorAndLoadOrders();
            } else {
                cardsContainer.style.display = 'grid';
                searchInput.style.display = 'block';
                if(category === 'drinks') filtersDiv.style.display = 'flex';
                searchInput.value = ""; 
                renderCards();
            }
        }

        function setFilter(filter, el) { currentFilter = filter; document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderCards(); }
        function filterCards() { renderCards(); }

        // --- ЧЕК-ЛИСТ (Оригинальная логика) ---
        let tasks = JSON.parse(localStorage.getItem('bartender_checklist')) || [];
        function saveTasks() { localStorage.setItem('bartender_checklist', JSON.stringify(tasks)); }
        function renderChecklist() {
            const listEl = document.getElementById('task-list'); listEl.innerHTML = '';
            if(tasks.length===0){ listEl.innerHTML = '<p style="color:var(--text-sec); text-align:center;">Задач пока нет. Добавь первую!</p>'; return; }
            tasks.forEach(task => {
                listEl.insertAdjacentHTML('beforeend', `<div class="cl-item ${task.done?'done':''}"><div class="cl-checkbox" onclick="toggleTask(${task.id})"></div><div class="cl-text" onclick="toggleTask(${task.id})">${task.text}</div><button class="cl-delete" onclick="deleteTask(${task.id})">✕</button></div>`);
            });
        }
        function addTask() { const input = document.getElementById('new-task'); if(input.value.trim()){ tasks.push({id: Date.now(), text: input.value.trim(), done: false}); input.value=''; saveTasks(); renderChecklist(); } }
        function handleTaskEnter(e) { if(e.key === 'Enter') addTask(); }
        window.toggleTask = id => { const t = tasks.find(x => x.id === id); if(t){ t.done = !t.done; saveTasks(); renderChecklist(); } }
        window.deleteTask = id => { tasks = tasks.filter(x => x.id !== id); saveTasks(); renderChecklist(); }

        // ==========================================
        // === ЛОГИКА КОЛЛЕКТИВНЫХ ЗАЯВОК (НОВОЕ) ===
        // ==========================================
        
        function getAuthorName() { return localStorage.getItem('tugai_author_name'); }

        function checkAuthorAndLoadOrders() {
            const name = getAuthorName();
            if (!name) {
                document.getElementById('auth-modal').style.display = 'flex';
            } else {
                fetchOrders();
                // Запускаем поллинг (обновление каждые 4 секунды пока открыта вкладка)
                orderSyncInterval = setInterval(fetchOrders, 4000);
            }
        }

        function saveAuthorName() {
            const input = document.getElementById('author-name-input');
            if (input.value.trim().length > 1) {
                localStorage.setItem('tugai_author_name', input.value.trim());
                document.getElementById('auth-modal').style.display = 'none';
                checkAuthorAndLoadOrders();
            } else {
                alert("Пожалуйста, введите нормальное имя");
            }
        }

        // 2. Обновление функции fetchOrders (добавлена проверка на ошибки)
async function fetchOrders() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/get_orders`);
        if (!response.ok) throw new Error('Ошибка сети');
        const orders = await response.json();
        const listEl = document.getElementById('active-orders-list');
        
        if (orders.length === 0) {
            listEl.innerHTML = '<p style="color:var(--text-sec); text-align:center; margin-top:20px;">Список заявок пуст.</p>';
            return;
        }

        listEl.innerHTML = '';
        orders.forEach(ord => {
            const commentHtml = ord.comment ? `<span style="color:#FF9F0A;">💬 ${ord.comment}</span>` : '';
            listEl.insertAdjacentHTML('beforeend', `
                <div class="order-card">
                    <div class="order-info">
                        <div class="order-title">${ord.item_name} <span style="color:var(--accent-pf); font-weight:bold;">— ${ord.quantity}</span></div>
                        <div class="order-meta">
                            <span class="order-author">👤 ${ord.author_name}</span>
                            ${commentHtml}
                        </div>
                    </div>
                    <button class="cl-delete" onclick="removeOrder(${ord.id})">✕</button>
                </div>
            `);
        });
    } catch (error) {
        console.error("Ошибка загрузки заявок:", error);
    }
}


        async function submitOrder() {
            const nameEl = document.getElementById('ord-name');
            const qtyEl = document.getElementById('ord-qty');
            const commentEl = document.getElementById('ord-comment');

            if (!nameEl.value.trim() || !qtyEl.value.trim()) {
                alert("Заполните название и количество!"); return;
            }

            const payload = {
                item_name: nameEl.value.trim(),
                quantity: qtyEl.value.trim(),
                comment: commentEl.value.trim(),
                author_name: getAuthorName()
            };

            const btn = document.querySelector('.btn-add-order');
            btn.innerText = "Добавление..."; btn.disabled = true;

            try {
                await fetch(`${API_BASE_URL}/add_order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                nameEl.value = ''; qtyEl.value = ''; commentEl.value = '';
                await fetchOrders(); // Обновляем список мгновенно
            } catch (e) {
                alert("Ошибка соединения с сервером");
            } finally {
                btn.innerText = "Добавить в общий список"; btn.disabled = false;
            }
        }

        async function removeOrder(id) {
            if(!confirm("Удалить позицию из общей заявки?")) return;
            try {
                await fetch(`${API_BASE_URL}/delete_order/${id}`, { method: 'DELETE' });
                fetchOrders();
            } catch (e) { alert("Ошибка удаления"); }
        }

       async function sendOrdersNow() {
    if(!confirm("Отправить список закупщику и ОЧИСТИТЬ базу?")) return;
    
    const btn = document.querySelector('.btn-send-now');
    const originalText = btn.innerHTML;
    btn.innerHTML = "⏳ Отправка..."; btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE_URL}/api/send_now`, { method: 'POST' });
        if(res.ok) {
            alert("✅ Заявка улетела в Telegram!");
            await fetchOrders(); // Сразу обновляем список (он станет пустым)
        } else {
            alert("❌ Ошибка при отправке");
        }
    } catch (e) {
        alert("Ошибка соединения с сервером");
    } finally {
        btn.innerHTML = originalText; btn.disabled = false;
    }
}

        // --- PWA Логика (Оригинальная) ---
        renderCards();
    </script>
