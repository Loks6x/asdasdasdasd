<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Мета-теги для iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тугай ТТК">
    <title>Тугай ТТК</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-search: #1C1C1E;
            --accent: #0A84FF; /* Apple Blue */
            --accent-pf: #30D158; /* Apple Green */
            --accent-danger: #FF453A; /* Apple Red */
            --text-main: #FFFFFF;
            --text-sec: #EBEBF599; /* Muted Apple text */
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 10px 0 25px;
            text-align: center;
        }

        /* Controls: Tabs & Search */
        .controls {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--glass-blur);
            padding: 10px 0 15px;
        }

        .segment-control {
            display: flex;
            background: var(--bg-search);
            border-radius: 12px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-sec);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-search);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        .search-bar:focus { border-color: var(--accent); }

        /* Filters (Pills) */
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-pill {
            background: var(--bg-search);
            border: 1px solid var(--border-color);
            color: var(--text-sec);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-pill.active {
            background: var(--text-main);
            color: var(--bg-base);
            border-color: var(--text-main);
        }

        /* Container for Cards & Checklist */
        .content-container {
            width: 100%;
            max-width: 1000px;
        }

        /* Cards Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            width: 100%;
        }

        /* Card Apple Style */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 19px; font-weight: 600; margin: 0; color: var(--text-main); }
        .chevron { color: var(--text-sec); transition: transform 0.3s ease; font-size: 14px; }
        .card.open .chevron { transform: rotate(180deg); }

        .card-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; }
        .card-content-inner { overflow: hidden; }
        .card.open .card-content { grid-template-rows: 1fr; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }

        .tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text-sec); }

        .section-title { color: var(--text-sec); font-size: 13px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .method { font-size: 15px; line-height: 1.5; color: var(--text-main); margin-bottom: 10px; }
        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 15px; line-height: 1.6;}
        li { margin-bottom: 4px; }

        /* Calculator Styles */
        .calc-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            background: rgba(48, 209, 88, 0.1); padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(48, 209, 88, 0.3);
        }
        .calc-label { font-size: 14px; color: var(--accent-pf); font-weight: 600; }
        .calc-input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff;
            padding: 6px 10px; border-radius: 8px; width: 80px; font-size: 16px; font-weight: 600; text-align: center; outline: none;
        }
        .calc-input:focus { border-color: var(--accent-pf); }
        .pf-ing-amount { font-weight: 700; color: var(--accent-pf); transition: color 0.2s;}

        /* Checklist Styles */
        #checklist-container { display: none; width: 100%; flex-direction: column; gap: 16px; }
        .cl-input-group { display: flex; gap: 10px; }
        .cl-input {
            flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-search); color: white; font-size: 16px; outline: none;
        }
        .cl-input:focus { border-color: var(--accent); }
        .cl-btn {
            background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .cl-btn:active { transform: scale(0.95); opacity: 0.8; }
        
        .cl-list { display: flex; flex-direction: column; gap: 10px; }
        .cl-item {
            background: var(--bg-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
            transition: 0.2s;
        }
        .cl-item.done { opacity: 0.6; }
        .cl-item.done .cl-text { text-decoration: line-through; color: var(--text-sec); }
        
        .cl-checkbox {
            width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-sec);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .cl-item.done .cl-checkbox { background: var(--accent); border-color: var(--accent); }
        .cl-item.done .cl-checkbox::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        
        .cl-text { flex: 1; font-size: 16px; color: var(--text-main); word-break: break-word; transition: 0.2s; cursor: pointer; }
        
        .cl-delete {
            background: rgba(255, 69, 58, 0.15); color: var(--accent-danger); border: none; width: 32px; height: 32px;
            border-radius: 8px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* PWA Install Button */
        #install-btn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: black; border: none; padding: 12px 24px; border-radius: 20px;
            font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Сиськи ахуенная тема ваще</h1>
    
    <div class="controls">
        <div class="segment-control">
            <button id="btn-drinks" class="tab-btn active" onclick="switchTab('drinks')">Напитки</button>
            <button id="btn-pf" class="tab-btn" onclick="switchTab('pf')">ПФ (База)</button>
            <button id="btn-checklist" class="tab-btn" onclick="switchTab('checklist')">Чек-лист</button>
        </div>
        
        <input type="text" id="search" class="search-bar" placeholder="Поиск (название, состав)..." onkeyup="filterCards()">
        
        <div class="filters" id="drink-filters">
            <div class="filter-pill active" onclick="setFilter('all', this)">Все</div>
            <div class="filter-pill" onclick="setFilter('cocktail', this)">Коктейли</div>
            <div class="filter-pill" onclick="setFilter('lemonade', this)">Лимонады</div>
            <div class="filter-pill" onclick="setFilter('smoothie', this)">Смузи</div>
            <div class="filter-pill" onclick="setFilter('nonalk', this)">Б/А</div>
        </div>
    </div>

    <div class="content-container">
        <!-- Сетка с карточками меню -->
        <div class="grid" id="cards-container"></div>

        <!-- Чек-лист (Скрыт по умолчанию) -->
        <div id="checklist-container">
            <div class="cl-input-group">
                <input type="text" id="new-task" class="cl-input" placeholder="Добавить задачу (напр. сварить сироп)..." onkeypress="handleTaskEnter(event)">
                <button class="cl-btn" onclick="addTask()">Плюс</button>
            </div>
            <div class="cl-list" id="task-list">
                <!-- Задачи будут тут -->
            </div>
        </div>
    </div>

    <!-- Кнопка установки приложения -->
    <button id="install-btn">Установить приложение</button>

    <script>
        // --- БАЗА ДАННЫХ ---
        const data = {
            drinks: [
                { category: "cocktail", name: "Апероль Спритц", glass: "Бокал для красного вина", volume: "220 мл", ingredients: ["Ликер Aperol - 60 мл", "Содовая - 30 мл", "Игристое Абрау Дюрсо - 100 мл", "Апельсин - 30 гр"], method: "В бокал с кусковым льдом, перемешать, украсить слайсом апельсина." },
                { category: "cocktail", name: "Беллини", glass: "Шале / Креманка", volume: "200 мл", ingredients: ["Пф Беллини - 80 мл", "Игристое Шато Двуморье - 120 мл"], method: "В блендер, немного взбить, перелить в шале. Украсить цветком." },
                { category: "cocktail", name: "Негрони", glass: "Рокс", volume: "90 мл", ingredients: ["Джин Bikens - 30 мл", "Cinzano 1757 rosso - 30 мл", "Campari - 30 мл"], method: "Стир в смесительном бокале, перелить в рокс со льдом, цедра апельсина." },
                { category: "cocktail", name: "Бэзил Смеш", glass: "Рокс", volume: "80 мл", ingredients: ["Джин - 40 мл", "Сахарный сироп - 20 мл", "Пф лимонный фреш - 20 мл", "Базилик свежий - 8 гр"], method: "Шейк с кусковым льдом, дабл стрейн в рокс, украсить базиликом." },
                { category: "cocktail", name: "Татарский Олд Фэшн", glass: "Рокс", volume: "70 мл", ingredients: ["Пф Бурбон/Курага - 70 мл"], method: "Стир, перелить в рокс. Окуриваем бокал окуривателем и щепой." },
                { category: "cocktail", name: "Лимончелло Спритц", glass: "Бокал", volume: "180 мл", ingredients: ["Пф Лимончелло - 60 мл", "Игристое Абрау - 90 мл", "Вода с газом - 30 мл"], method: "В бокал со льдом, перемешать, мята и долька лимона." },
                { category: "cocktail", name: "Мартини-Эспрессо", glass: "Креманка", volume: "115 мл", ingredients: ["Водка Белуга - 40 мл", "Эспрессо - 40 мл", "Мари Бризар Кофе - 25 мл", "Сахарный сироп - 10 мл"], method: "Шейк, креманка, кофейные зерна." },
                { category: "cocktail", name: "Май-Тай", glass: "Рокс", volume: "140 мл", ingredients: ["Ром Бланко - 30 мл", "Ром Такамака - 30 мл", "Трипл Сек - 30 мл", "Амаретто - 10 мл", "Сахарный сироп - 10 мл", "Фреш лайма - 30 мл"], method: "Шейк, фраппе лед, сушеный апельсин." },
                { category: "cocktail", name: "Порн Стар Мартини", glass: "Креманка", volume: "160+50", ingredients: ["Пф Маракуйя - 60 мл", "Водка ваниль - 50 мл", "Игристое брют - 50 мл (шот)"], method: "Шейк + драй шейк. Отдельно шот игристого." },
                
                { category: "lemonade", name: "Малина с персиком", glass: "Хайбол", volume: "160 мл", ingredients: ["Пф Малина/Персик - 70 мл", "Содовая - 90 мл"], method: "В хайбол со льдом, перемешать." },
                { category: "lemonade", name: "Манго и маракуйя", glass: "Хайбол", volume: "160 мл", ingredients: ["Пф Тропики - 70 мл", "Содовая - 90 мл"], method: "В хайбол со льдом, перемешать." },
                
                { category: "smoothie", name: "Зеленый смузи", glass: "Хайбол", volume: "350 мл", ingredients: ["Огурец - 100 гр", "Яблоко - 100 гр", "Лимон - 40 гр", "Базилик - 5 гр", "Мята - 3 гр", "Сироп - 10 мл", "Вода - 50 мл"], method: "В блендер." },
                
                { category: "nonalk", name: "Маргарита 0,0", glass: "Креманка", volume: "90 мл", ingredients: ["Дринксом текила - 40 мл", "Дринксом апельсин - 20 мл", "Сахарный сироп - 10 мл", "Фреш лайма - 20 мл"], method: "Шейк, креманка с солью." },
                { category: "nonalk", name: "Апероль-Спритц 0,0", glass: "Бокал", volume: "220 мл", ingredients: ["Дринксом апельсин - 100 мл", "Вода с газом - 100 мл", "Сахарный сироп - 10 мл"], method: "В бокал со льдом." }
            ],
            pf: [
                { name: "Пф Микс кислот", baseVol: 1000, ingredients: ["Лимонная кислота - 16 гр", "Винная кислота - 8 гр", "Яблочная кислота - 12 гр", "Вода - 1000 мл"], method: "Смешиваем в мернике до растворения." },
                { name: "Пф Сахарный сироп", baseVol: 1000, ingredients: ["Сахар - 900 гр", "Вода - 700 мл"], method: "Варим до растворения." },
                { name: "Пф Алоэ", baseVol: 650, ingredients: ["Вода - 250 мл", "Напиток Алоэ - 250 мл", "Пф сахарный сироп - 100 мл", "Пф Микс кислот - 50 мл"], method: "Алоэ фильтруем, все смешиваем." },
                { name: "Пф Клубника/цитрус", baseVol: 800, ingredients: ["Клубника с/м - 250 гр", "Джин - 400 мл", "Luxardo Aperitivo - 300 мл", "Сахар - 150 гр", "Лимонный фреш - 150 мл"], method: "Вакуум, су-вид 55°C на 4 часа." },
                { name: "Пф Бурбон/Курага", baseVol: 450, ingredients: ["Бурбон - 500 мл", "Курага - 100 гр", "Пф кордиал мед - 100 мл"], method: "Вакуум, су-вид 55°C на 4 часа." },
                { name: "Пф Беллини", baseVol: 1200, ingredients: ["Пюре персик - 500 гр", "Сок персиковый - 250 мл", "Сахар - 250 гр", "Вода - 250 мл", "Пф лимон - 300 мл"], method: "Варим, цедим." },
                { name: "Пф Лимончелло", baseVol: 800, ingredients: ["Водка - 500 мл", "Цедра лимонов - 3 шт", "Лимонный фреш - 150 мл", "Сироп - 150 мл"], method: "Су-вид 50°C 5 часов. Цедим." }
            ]
        };

        // --- ЛОГИКА ВКЛАДОК И ПОИСКА ---
        let currentCategory = 'drinks';
        let currentFilter = 'all';
        
        const cardsContainer = document.getElementById('cards-container');
        const checklistContainer = document.getElementById('checklist-container');
        const searchInput = document.getElementById('search');
        const filtersDiv = document.getElementById('drink-filters');

        function parseIngredient(ingString) {
            const match = ingString.match(/(.+) - ([\d.,]+)\s*(.+)?/);
            if (match) return { name: match[1], amount: parseFloat(match[2].replace(',', '.')), unit: match[3] || '' };
            return { raw: ingString };
        }

        function renderCards() {
            cardsContainer.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            let items = data[currentCategory];
            
            if (currentCategory === 'drinks' && currentFilter !== 'all') {
                items = items.filter(item => item.category === currentFilter);
            }

            const filteredItems = items.filter(item => {
                const textToSearch = (item.name + " " + item.ingredients.join(" ") + " " + item.method).toLowerCase();
                return textToSearch.includes(query);
            });

            if(filteredItems.length === 0) {
                cardsContainer.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%; margin-top: 40px;">Ничего не найдено</p>';
                return;
            }

            filteredItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let tagsHtml = '<div class="tags">';
                if (item.glass) tagsHtml += `<span class="tag">🍸 ${item.glass}</span>`;
                if (item.volume && item.volume !== "-") tagsHtml += `<span class="tag">💧 ${item.volume}</span>`;
                tagsHtml += '</div>';

                let calcHtml = '';
                let ingListHtml = '';
                const hasCalc = currentCategory === 'pf' && item.baseVol;

                if (hasCalc) {
                    calcHtml = `
                        <div class="calc-row" onclick="event.stopPropagation()">
                            <span class="calc-label">Объем ПФ:</span>
                            <input type="number" class="calc-input" id="calc-${index}" value="${item.baseVol}" data-base="${item.baseVol}" oninput="updateMath(${index})">
                            <span class="calc-unit">мл</span>
                        </div>
                    `;
                    ingListHtml = item.ingredients.map((ing, i) => {
                        const parsed = parseIngredient(ing);
                        if (parsed.raw) return `<li>${parsed.raw}</li>`;
                        return `<li>${parsed.name} - <span id="ing-${index}-${i}" class="pf-ing-amount" data-base="${parsed.amount}">${parsed.amount}</span> ${parsed.unit}</li>`;
                    }).join('');
                } else {
                    ingListHtml = item.ingredients.map(ing => `<li>${ing}</li>`).join('');
                }

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${item.name}</h3>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="card-content">
                        <div class="card-content-inner">
                            ${(item.glass || item.volume) ? tagsHtml : ''}
                            ${calcHtml}
                            <div class="section-title">Состав:</div>
                            <ul>${ingListHtml}</ul>
                            <div class="section-title">Технология:</div>
                            <div class="method">${item.method}</div>
                        </div>
                    </div>
                `;

                card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
                cardsContainer.appendChild(card);
            });
        }

        window.updateMath = function(cardIndex) {
            const input = document.getElementById(`calc-${cardIndex}`);
            const baseVol = parseFloat(input.getAttribute('data-base'));
            const targetVol = parseFloat(input.value) || 0;
            const ratio = targetVol / baseVol;

            document.querySelectorAll(`[id^="ing-${cardIndex}-"]`).forEach(span => {
                const baseAmount = parseFloat(span.getAttribute('data-base'));
                let newAmount = baseAmount * ratio;
                span.innerText = Number.isInteger(newAmount) ? newAmount : newAmount.toFixed(1);
            });
        };

        function switchTab(category) {
            currentCategory = category;
            
            document.getElementById('btn-drinks').classList.toggle('active', category === 'drinks');
            document.getElementById('btn-pf').classList.toggle('active', category === 'pf');
            document.getElementById('btn-checklist').classList.toggle('active', category === 'checklist');
            
            if (category === 'checklist') {
                cardsContainer.style.display = 'none';
                filtersDiv.style.display = 'none';
                searchInput.style.display = 'none';
                checklistContainer.style.display = 'flex';
                renderChecklist();
            } else {
                cardsContainer.style.display = 'grid';
                checklistContainer.style.display = 'none';
                searchInput.style.display = 'block';
                filtersDiv.style.display = category === 'drinks' ? 'flex' : 'none';
                searchInput.value = ""; 
                renderCards();
            }
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderCards();
        }

        function filterCards() { renderCards(); }

        // --- ЛОГИКА ЧЕК-ЛИСТА (ХРАНЕНИЕ В ТЕЛЕФОНЕ) ---
        let tasks = JSON.parse(localStorage.getItem('bartender_checklist')) || [];

        function saveTasks() {
            localStorage.setItem('bartender_checklist', JSON.stringify(tasks));
        }

        function renderChecklist() {
            const listEl = document.getElementById('task-list');
            listEl.innerHTML = '';
            
            if(tasks.length === 0) {
                listEl.innerHTML = '<p style="color:var(--text-sec); text-align:center;">Задач пока нет. Добавь первую!</p>';
                return;
            }

            tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `cl-item ${task.done ? 'done' : ''}`;
                item.innerHTML = `
                    <div class="cl-checkbox" onclick="toggleTask(${task.id})"></div>
                    <div class="cl-text" onclick="toggleTask(${task.id})">${task.text}</div>
                    <button class="cl-delete" onclick="deleteTask(${task.id})">✕</button>
                `;
                listEl.appendChild(item);
            });
        }

        function addTask() {
            const input = document.getElementById('new-task');
            const text = input.value.trim();
            if(text) {
                tasks.push({ id: Date.now(), text: text, done: false });
                input.value = '';
                saveTasks();
                renderChecklist();
            }
        }

        function handleTaskEnter(e) {
            if (e.key === 'Enter') addTask();
        }

        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.done = !task.done;
                saveTasks();
                renderChecklist();
            }
        }

        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderChecklist();
        }

        // --- МАГИЯ PWA (УСТАНОВКА НА ЭКРАН) ---
        // 1. Создаем фальшивый Service Worker и Manifest на лету, чтобы браузер понял, что это "Приложение"
        
        // Базовая иконка (SVG)
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#000"/><text y="50%" x="50%" dominant-baseline="middle" text-anchor="middle" font-size="50">🍸</text></svg>`;
        const encodedIcon = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgIcon)));

        const manifest = {
            "name": "Тугай ТТК",
            "short_name": "ТТК Бар",
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#000000",
            "start_url": window.location.href,
            "icons": [{"src": encodedIcon, "sizes": "512x512", "type": "image/svg+xml"}]
        };

        // Внедряем манифест
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);

        // Внедряем пустой Service Worker (требование для установки)
        const swCode = `self.addEventListener('fetch', function(e) {});`;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW setup failed', err));
        }

        // 2. Логика кнопки "Установить на экран"
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Предотвращаем автоматический показ (особенно на Android)
            e.preventDefault();
            // Сохраняем событие, чтобы вызвать его по кнопке
            deferredPrompt = e;
            // Показываем кнопку
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Показываем системное окно установки
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none'; // Прячем кнопку если установили
                }
                deferredPrompt = null;
            }
        });

        // На iOS (Safari) событие beforeinstallprompt не работает. 
        // Если хочешь, можно добавить всплывашку "Нажмите Поделиться -> На экран домой" специально для айфонов, 
        // но пока приложение будет работать в браузере как часы.

        // Запуск
        renderCards();
    </script>
</body>
</html>
