<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar App Pro</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-search: #1C1C1E;
            --accent: #0A84FF; /* Apple Blue */
            --accent-pf: #30D158; /* Apple Green */
            --text-main: #FFFFFF;
            --text-sec: #EBEBF599; /* Muted Apple text */
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 10px 0 25px;
            text-align: center;
        }

        /* Controls: Tabs & Search */
        .controls {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--glass-blur);
            padding: 10px 0 15px;
        }

        .segment-control {
            display: flex;
            background: var(--bg-search);
            border-radius: 12px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-sec);
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-search);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        .search-bar:focus { border-color: var(--accent); }

        /* Filters (Pills) */
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-pill {
            background: var(--bg-search);
            border: 1px solid var(--border-color);
            color: var(--text-sec);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-pill.active {
            background: var(--text-main);
            color: var(--bg-base);
            border-color: var(--text-main);
        }

        /* Cards Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1000px;
        }

        /* Card Apple Style */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .card:active { transform: scale(0.98); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 19px;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
        }

        .chevron {
            color: var(--text-sec);
            transition: transform 0.3s ease;
            font-size: 14px;
        }

        .card.open .chevron { transform: rotate(180deg); }

        /* Content inside card */
        .card-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }

        .card-content-inner { overflow: hidden; }

        .card.open .card-content {
            grid-template-rows: 1fr;
            margin-top: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sec);
        }

        .section-title {
            color: var(--text-sec);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .method {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 15px; line-height: 1.6;}
        li { margin-bottom: 4px; }

        /* Calculator Styles */
        .calc-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            background: rgba(48, 209, 88, 0.1);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(48, 209, 88, 0.3);
        }

        .calc-label { font-size: 14px; color: var(--accent-pf); font-weight: 600; }
        
        .calc-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            width: 80px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        .calc-input:focus { border-color: var(--accent-pf); }
        .calc-unit { font-size: 14px; color: var(--text-sec); }

        .pf-ing-amount { font-weight: 700; color: var(--accent-pf); transition: color 0.2s;}
    </style>
</head>

        // Парсер ингредиентов для калькулятора (вытаскивает число и текст)
        function parseIngredient(ingString) {
            const match = ingString.match(/(.+) - ([\d.,]+)\s*(.+)?/);
            if (match) {
                return { name: match[1], amount: parseFloat(match[2].replace(',', '.')), unit: match[3] || '' };
            }
            return { raw: ingString }; // Если нет числа
        }

        function renderCards() {
            container.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            let items = data[currentCategory];
            
            // Фильтрация по категории напитков
            if (currentCategory === 'drinks' && currentFilter !== 'all') {
                items = items.filter(item => item.category === currentFilter);
            }

            // Фильтрация по поиску
            const filteredItems = items.filter(item => {
                const textToSearch = (item.name + " " + item.ingredients.join(" ") + " " + item.method).toLowerCase();
                return textToSearch.includes(query);
            });

            if(filteredItems.length === 0) {
                container.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%; margin-top: 40px;">Ничего не найдено</p>';
                return;
            }

            filteredItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let tagsHtml = '<div class="tags">';
                if (item.glass) tagsHtml += `<span class="tag">🍸 ${item.glass}</span>`;
                if (item.volume && item.volume !== "-") tagsHtml += `<span class="tag">💧 ${item.volume}</span>`;
                tagsHtml += '</div>';

                // Логика калькулятора только для ПФ с базовым объемом
                let calcHtml = '';
                let ingListHtml = '';
                const hasCalc = currentCategory === 'pf' && item.baseVol;

                if (hasCalc) {
                    calcHtml = `
                        <div class="calc-row" onclick="event.stopPropagation()">
                            <span class="calc-label">Объем ПФ:</span>
                            <input type="number" class="calc-input" id="calc-${index}" value="${item.baseVol}" data-base="${item.baseVol}" oninput="updateMath(${index})">
                            <span class="calc-unit">мл</span>
                        </div>
                    `;
                    
                    ingListHtml = item.ingredients.map((ing, i) => {
                        const parsed = parseIngredient(ing);
                        if (parsed.raw) return `<li>${parsed.raw}</li>`;
                        return `<li>${parsed.name} - <span id="ing-${index}-${i}" class="pf-ing-amount" data-base="${parsed.amount}">${parsed.amount}</span> ${parsed.unit}</li>`;
                    }).join('');
                } else {
                    ingListHtml = item.ingredients.map(ing => `<li>${ing}</li>`).join('');
                }

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${item.name}</h3>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="card-content">
                        <div class="card-content-inner">
                            ${(item.glass || item.volume) ? tagsHtml : ''}
                            ${calcHtml}
                            <div class="section-title">Состав:</div>
                            <ul>${ingListHtml}</ul>
                            <div class="section-title">Технология:</div>
                            <div class="method">${item.method}</div>
                        </div>
                    </div>
                `;

                // Открытие карточки
                card.querySelector('.card-header').addEventListener('click', () => {
                    card.classList.toggle('open');
                });

                container.appendChild(card);
            });
        }

        // Функция пересчета калькулятора
        window.updateMath = function(cardIndex) {
            const input = document.getElementById(`calc-${cardIndex}`);
            const baseVol = parseFloat(input.getAttribute('data-base'));
            const targetVol = parseFloat(input.value) || 0;
            const ratio = targetVol / baseVol;

            // Находим все ингредиенты в этой карточке
            const item = data.pf.find(p => p.baseVol == baseVol); // грубый поиск, но для уникальных объемов работает
            
            // Находим спаны и обновляем числа
            const spans = document.querySelectorAll(`[id^="ing-${cardIndex}-"]`);
            spans.forEach(span => {
                const baseAmount = parseFloat(span.getAttribute('data-base'));
                let newAmount = baseAmount * ratio;
                // Округляем красиво (без лишних нулей)
                span.innerText = Number.isInteger(newAmount) ? newAmount : newAmount.toFixed(1);
            });
        };

        function switchTab(category) {
            currentCategory = category;
            
            document.getElementById('btn-drinks').classList.toggle('active', category === 'drinks');
            document.getElementById('btn-pf').classList.toggle('active', category === 'pf');
            
            filtersDiv.style.display = category === 'drinks' ? 'flex' : 'none';
            searchInput.value = ""; 
            renderCards();
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderCards();
        }

        function filterCards() {
            renderCards();
        }

        // Запуск
        renderCards();
    </script>
</body>
</html>
