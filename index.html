<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тугай ТТК">
    <title>Тугай ТТК</title>
    <style>
        /* Apple-style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-search: #1C1C1E;
            --accent: #0A84FF;
            --accent-pf: #30D158;
            --accent-danger: #FF453A;
            --text-main: #FFFFFF;
            --text-sec: #EBEBF599;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; margin: 10px 0 25px; text-align: center; }

        .controls {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px;
            margin-bottom: 24px; position: sticky; top: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: var(--glass-blur); padding: 10px 0 15px;
        }

        .segment-control { display: flex; background: var(--bg-search); border-radius: 12px; padding: 4px; }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-sec); padding: 10px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255, 255, 255, 0.15); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .search-bar {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-search); color: white; font-size: 16px; outline: none; transition: border 0.2s;
        }
        .search-bar:focus { border-color: var(--accent); }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-pill {
            background: var(--bg-search); border: 1px solid var(--border-color); color: var(--text-sec);
            padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); border-color: var(--text-main); }

        .content-container { width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; width: 100%; }

        .card {
            background: var(--bg-card); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: background 0.3s, transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 19px; font-weight: 600; margin: 0; color: var(--text-main); line-height: 1.2; }
        .chevron { color: var(--text-sec); transition: transform 0.3s ease; font-size: 14px; }
        .card.open .chevron { transform: rotate(180deg); }
        .card-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; }
        .card-content-inner { overflow: hidden; }
        .card.open .card-content { grid-template-rows: 1fr; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }

        .tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text-sec); }
        .section-title { color: var(--text-sec); font-size: 13px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .method { font-size: 15px; line-height: 1.5; color: var(--text-main); margin-bottom: 10px; }
        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 15px; line-height: 1.6;}
        li { margin-bottom: 4px; }

        .calc-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            background: rgba(48, 209, 88, 0.1); padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(48, 209, 88, 0.3);
        }
        .calc-label { font-size: 14px; color: var(--accent-pf); font-weight: 600; }
        .calc-input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff;
            padding: 6px 10px; border-radius: 8px; width: 80px; font-size: 16px; font-weight: 600; text-align: center; outline: none;
        }
        .calc-input:focus { border-color: var(--accent-pf); }
        .pf-ing-amount { font-weight: 700; color: var(--accent-pf); transition: color 0.2s;}

        #checklist-container { display: none; width: 100%; flex-direction: column; gap: 16px; }
        .cl-input-group { display: flex; gap: 10px; }
        .cl-input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-search); color: white; font-size: 16px; outline: none; }
        .cl-input:focus { border-color: var(--accent); }
        .cl-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .cl-list { display: flex; flex-direction: column; gap: 10px; }
        .cl-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .cl-item.done { opacity: 0.6; }
        .cl-item.done .cl-text { text-decoration: line-through; color: var(--text-sec); }
        .cl-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-sec); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .cl-item.done .cl-checkbox { background: var(--accent); border-color: var(--accent); }
        .cl-item.done .cl-checkbox::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        .cl-text { flex: 1; font-size: 16px; word-break: break-word; cursor: pointer; }
        .cl-delete { background: rgba(255, 69, 58, 0.15); color: var(--accent-danger); border: none; width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer; }

        #install-btn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: black; border: none; padding: 12px 24px; border-radius: 20px;
            font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Тугай ТТК</h1>
    
    <div class="controls">
        <div class="segment-control">
            <button id="btn-drinks" class="tab-btn active" onclick="switchTab('drinks')">Напитки</button>
            <button id="btn-pf" class="tab-btn" onclick="switchTab('pf')">ПФ (База)</button>
            <button id="btn-checklist" class="tab-btn" onclick="switchTab('checklist')">Чек-лист</button>
        </div>
        
        <input type="text" id="search" class="search-bar" placeholder="Поиск (название, состав)..." onkeyup="filterCards()">
        
        <div class="filters" id="drink-filters">
            <div class="filter-pill active" onclick="setFilter('all', this)">Все</div>
            <div class="filter-pill" onclick="setFilter('cocktail', this)">Коктейли</div>
            <div class="filter-pill" onclick="setFilter('lemonade', this)">Лимонады</div>
            <div class="filter-pill" onclick="setFilter('smoothie', this)">Смузи</div>
            <div class="filter-pill" onclick="setFilter('nonalk', this)">Б/А</div>
            <div class="filter-pill" onclick="setFilter('tea_coffee', this)">Чай / Кофе</div>
        </div>
    </div>

    <div class="content-container">
        <div class="grid" id="cards-container"></div>

        <div id="checklist-container">
            <div class="cl-input-group">
                <input type="text" id="new-task" class="cl-input" placeholder="Добавить задачу..." onkeypress="handleTaskEnter(event)">
                <button class="cl-btn" onclick="addTask()">Плюс</button>
            </div>
            <div class="cl-list" id="task-list"></div>
        </div>
    </div>

    <button id="install-btn">Установить приложение</button>

    <script>

                { name: "Пф Мэри", baseVol: 500, ingredients: ["Томаты в собств. соку - 300 гр", "Сок томатный - 150 мл", "Вяленые томаты - 30 гр", "Халапеньо - 12 гр", "Табаско - 5 гр", "Апельсины - 250 гр (или фреш 150 мл)", "Ворчестер - 35 гр", "Копченая паприка - 2 гр", "Пф сахарный сироп - 10 мл", "Пф микс кислот - 10 мл"], method: "Все в блендер (кроме фреша апельсина), перебить. Добавить фреш апельсина (100 мл)." },
                { name: "Пф Черная смородина/джин", baseVol: 350, ingredients: ["Черная смородина с/м - 100 гр", "Джин Campobay - 250 мл", "Мята свежая - 2 гр", "Пф сахарный сироп - 100 мл", "Лимонный фреш - 50 мл"], method: "Су-вид на 55°C 4 часа, фильтруем. Добавляем баланс (сироп и фреш)." },
                { name: "Пф Бурбон/Курага", baseVol: 450, ingredients: ["Бурбон Jim Beam - 500 мл", "Курага - 100 гр", "Пф кордиал мед - 100 мл"], method: "Засыпаем в пакет и су-вид 4 часа на 55°C." },
                { name: "Пф Грейпфрутовый кордиал", baseVol: 650, ingredients: ["Грейпфрут - 800 гр (300 мл фреш)", "Сахар - 130 гр", "Пф лаймовый фреш - 250 мл", "Вода - 100 мл", "Цедра грейпфрута - 18 гр", "Лимонная кислота - 9 гр"], method: "Цедра с сахаром на 20 мин. Остальное смешать, нагреть до 60°C. Отжать цедру, профильтровать." },
                { name: "Пф Гибискус", baseVol: 400, ingredients: ["Вода - 400 мл", "Пф Сахарный сироп - 100 мл", "Чай каркаде - 20 гр", "Винная кислота - 6 гр"], method: "Закидываем в сотейник, выпариваем 100 мл от объема, остужаем, цедим." },
                { name: "пф Кир", baseVol: 450, ingredients: ["Водка Organic - 100 мл", "Bv Land cassis - 100 мл", "Bv Land Blackberry - 100 мл", "Пф Гибискус - 150 мл"], method: "Перемешиваем и переливаем в бутылку." },
                { name: "Пф Беллини", baseVol: 1200, ingredients: ["Пюре персик - 500 гр", "Сок персиковый - 250 мл", "Сахар - 250 гр", "Вода - 250 мл", "Пф лимонный фреш - 300 мл"], method: "Заливаем в сотейник, варим, цедим." },
                { name: "Пф Мятная вода", baseVol: 700, ingredients: ["Вода - 500 мл", "Мята - 50 гр", "Пф микс кислот - 100 мл", "Пф сахарный сироп - 300 мл", "Бентонит - 2 гр"], method: "Перебиваем в блендере, добавляем бентонит, перемешиваем венчиком. В холод до осветления, сливаем чистое." },
                { name: "Пф Фейхоа", baseVol: 550, ingredients: ["Пюре фейхоа - 200 гр", "Сок яблоко - 100 мл", "Пф лимонный фреш - 100 мл", "Сахар - 50 гр", "Вода - 150 мл"], method: "В сотейник, вывариваем, цедим в бутылку." },
                { name: "пф Текила/клубника", baseVol: 250, ingredients: ["Клубника с/м - 100 гр", "Текила La Mision - 300 мл"], method: "Вакуум, су-вид 55°C на 4 часа." },
                { name: "пф Кордиал мед", baseVol: 400, ingredients: ["Мед цветочный - 100 гр", "Вода - 300 мл"], method: "Перемешиваем в сотейнике на низких температурах." },
                { name: "ПФ Карамельная пена", baseVol: 300, ingredients: ["Сливки 11% б/л - 300 мл", "Ксантан - 1 гр", "Сироп карамельный - 50 мл"], method: "Греем сливки (не до кипения), добавляем сироп и ксантан, мешаем венчиком, в кример." },
                { name: "пф Тархун", baseVol: 200, ingredients: ["Эстрагон свежий - 100 гр", "Пф сахарный сироп - 300 мл", "Яблочная кислота - 5 гр"], method: "Перебиваем эстрагон с сиропом, цедим, балансируем кислотой." },
                { name: "пф Молочная кислота", baseVol: 1000, ingredients: ["Молочная кислота 80% - 50 мл", "Вода - 1000 мл"], method: "Смешиваем все в мернике." },
                { name: "Пф Лимончелло", baseVol: 800, ingredients: ["Водка Organic - 500 мл", "Лимоны - 400 гр (снять цедру, выжать фреш 150 мл)", "Пф сахарный сироп - 150 мл"], method: "Цедра в водке в су-вид 50°C 5 часов. Цедим, добавляем 150 мл фреша и 150 мл сиропа." },
                { name: "Пф Маракуйя", baseVol: 700, ingredients: ["Пюре маракуйя - 400 гр", "Пф Сахарный сироп - 150 мл", "Пф Лимонный фреш - 150 мл"], method: "Смешать." },
                { name: "Пф Тропики", baseVol: 700, ingredients: ["Пюре манго - 300 гр", "Пюре маракуйя - 150 гр", "Пф сахарный сироп - 100 мл", "Микс кислот - 100 мл"], method: "Смешать." },
                { name: "Пф Малина/Персик", baseVol: 630, ingredients: ["Пюре малина - 200 гр", "Пф беллини - 300 мл", "Пф сахарный сироп - 100 мл", "Микс кислот - 100 мл"], method: "Смешать." },
                { name: "ПФ Брусника", baseVol: 850, ingredients: ["Пюре брусники - 500 гр", "Пф сахарный сироп - 150 мл", "Вода - 200 мл"], method: "Смешать ингредиенты." },
                { name: "Пф Арбуз-Мята", baseVol: 400, ingredients: ["Арбуз - 420 гр", "Лимон - 150 гр", "Сахарный сироп - 60 мл", "Мята - 15 гр"], method: "Перебиваем в блендере, фильтруем через сито." },
                { name: "Пф Грог", baseVol: 500, ingredients: ["Вода - 500 мл", "Гвоздика - 6 шт", "Бадьян - 2 шт", "Апельсин - 6 долек", "Лимон - 6 долек", "Мед - 30 гр", "Варенье шишки - 10 гр", "Пф имбирь - 40 мл", "Водка - 100 мл"], method: "Проварить все ингредиенты в сотейнике при 80°C 10 минут." },
                { name: "Пф Имбирь", baseVol: 100, ingredients: ["Имбирь - 100 гр", "Вода - 100 мл"], method: "Перебить имбирь и кипяток 1/1 в блендере, настоять 10 минут, отжать через марлю." },
                { name: "Пф Лимонный фреш", baseVol: 200, ingredients: ["Лимоны - 500 гр"], method: "Отжать фреш через соковыжималку." },
                { name: "Пф Лаймовый фреш", baseVol: 200, ingredients: ["Лаймы - 450 гр"], method: "Отжать фреш через соковыжималку." }
            ]
        };

        let currentCategory = 'drinks';
        let currentFilter = 'all';
        const cardsContainer = document.getElementById('cards-container');
        const checklistContainer = document.getElementById('checklist-container');
        const searchInput = document.getElementById('search');
        const filtersDiv = document.getElementById('drink-filters');

        function parseIngredient(ingString) {
            const match = ingString.match(/(.+) - ([\d.,]+)\s*(.+)?/);
            if (match) return { name: match[1], amount: parseFloat(match[2].replace(',', '.')), unit: match[3] || '' };
            return { raw: ingString };
        }

        function renderCards() {
            cardsContainer.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            let items = data[currentCategory];
            
            if (currentCategory === 'drinks' && currentFilter !== 'all') {
                items = items.filter(item => item.category === currentFilter);
            }

            const filteredItems = items.filter(item => {
                const textToSearch = (item.name + " " + item.ingredients.join(" ") + " " + item.method).toLowerCase();
                return textToSearch.includes(query);
            });

            if(filteredItems.length === 0) {
                cardsContainer.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%; margin-top: 40px;">Ничего не найдено</p>';
                return;
            }

            filteredItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let tagsHtml = '<div class="tags">';
                if (item.glass) tagsHtml += `<span class="tag">🍸 ${item.glass}</span>`;
                if (item.volume && item.volume !== "-") tagsHtml += `<span class="tag">💧 ${item.volume}</span>`;
                tagsHtml += '</div>';

                let calcHtml = '';
                let ingListHtml = '';
                const hasCalc = currentCategory === 'pf' && item.baseVol;

                if (hasCalc) {
                    calcHtml = `
                        <div class="calc-row" onclick="event.stopPropagation()">
                            <span class="calc-label">Объем:</span>
                            <input type="number" class="calc-input" id="calc-${index}" value="${item.baseVol}" data-base="${item.baseVol}" oninput="updateMath(${index})">
                            <span class="calc-unit">мл/гр</span>
                        </div>
                    `;
                    ingListHtml = item.ingredients.map((ing, i) => {
                        const parsed = parseIngredient(ing);
                        if (parsed.raw) return `<li>${parsed.raw}</li>`;
                        return `<li>${parsed.name} - <span id="ing-${index}-${i}" class="pf-ing-amount" data-base="${parsed.amount}">${parsed.amount}</span> ${parsed.unit}</li>`;
                    }).join('');
                } else {
                    ingListHtml = item.ingredients.map(ing => `<li>${ing}</li>`).join('');
                }

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${item.name}</h3>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="card-content">
                        <div class="card-content-inner">
                            ${(item.glass || item.volume) ? tagsHtml : ''}
                            ${calcHtml}
                            <div class="section-title">Состав:</div>
                            <ul>${ingListHtml}</ul>
                            <div class="section-title">Технология:</div>
                            <div class="method">${item.method}</div>
                        </div>
                    </div>
                `;

                card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
                cardsContainer.appendChild(card);
            });
        }

        window.updateMath = function(cardIndex) {
            const input = document.getElementById(`calc-${cardIndex}`);
            const baseVol = parseFloat(input.getAttribute('data-base'));
            const targetVol = parseFloat(input.value) || 0;
            const ratio = targetVol / baseVol;

            document.querySelectorAll(`[id^="ing-${cardIndex}-"]`).forEach(span => {
                const baseAmount = parseFloat(span.getAttribute('data-base'));
                let newAmount = baseAmount * ratio;
                span.innerText = Number.isInteger(newAmount) ? newAmount : newAmount.toFixed(1);
            });
        };

        function switchTab(category) {
            currentCategory = category;
            
            document.getElementById('btn-drinks').classList.toggle('active', category === 'drinks');
            document.getElementById('btn-pf').classList.toggle('active', category === 'pf');
            document.getElementById('btn-checklist').classList.toggle('active', category === 'checklist');
            
            if (category === 'checklist') {
                cardsContainer.style.display = 'none';
                filtersDiv.style.display = 'none';
                searchInput.style.display = 'none';
                checklistContainer.style.display = 'flex';
                renderChecklist();
            } else {
                cardsContainer.style.display = 'grid';
                checklistContainer.style.display = 'none';
                searchInput.style.display = 'block';
                filtersDiv.style.display = category === 'drinks' ? 'flex' : 'none';
                searchInput.value = ""; 
                renderCards();
            }
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderCards();
        }

        function filterCards() { renderCards(); }

        // --- ЧЕК-ЛИСТ ---
        let tasks = JSON.parse(localStorage.getItem('bartender_checklist')) || [];

        function saveTasks() { localStorage.setItem('bartender_checklist', JSON.stringify(tasks)); }

        function renderChecklist() {
            const listEl = document.getElementById('task-list');
            listEl.innerHTML = '';
            if(tasks.length === 0) { listEl.innerHTML = '<p style="color:var(--text-sec); text-align:center;">Задач пока нет. Добавь первую!</p>'; return; }
            tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `cl-item ${task.done ? 'done' : ''}`;
                item.innerHTML = `
                    <div class="cl-checkbox" onclick="toggleTask(${task.id})"></div>
                    <div class="cl-text" onclick="toggleTask(${task.id})">${task.text}</div>
                    <button class="cl-delete" onclick="deleteTask(${task.id})">✕</button>
                `;
                listEl.appendChild(item);
            });
        }

        function addTask() {
            const input = document.getElementById('new-task');
            if(input.value.trim()) {
                tasks.push({ id: Date.now(), text: input.value.trim(), done: false });
                input.value = ''; saveTasks(); renderChecklist();
            }
        }
        function handleTaskEnter(e) { if (e.key === 'Enter') addTask(); }
        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if(task) { task.done = !task.done; saveTasks(); renderChecklist(); }
        }
        window.deleteTask = function(id) { tasks = tasks.filter(t => t.id !== id); saveTasks(); renderChecklist(); }

        // --- PWA (Установка на экран) ---
        const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#000"/><text y="50%" x="50%" dominant-baseline="middle" text-anchor="middle" font-size="50">🍸</text></svg>`;
        const manifest = {
            "name": "Тугай ТТК", "short_name": "ТТК Бар", "display": "standalone", "background_color": "#000000", "theme_color": "#000000",
            "start_url": window.location.href, "icons": [{"src": "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgIcon))), "sizes": "512x512", "type": "image/svg+xml"}]
        };
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}))}">`);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('fetch', e => {});`], {type: 'application/javascript'}))).catch(()=>{});

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') installBtn.style.display = 'none'; deferredPrompt = null; }
        });

        renderCards();
    </script>
</body>
</html>
