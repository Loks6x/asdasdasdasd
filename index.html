<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тугай ТТК">
    <title>Тугай ТТК</title>
    <style>
        /* iOS 17 Apple Style Typography & Reset */
        :root {
            --bg-base: #000000;
            --bg-elevated: #1C1C1E;
            --bg-search: rgba(118, 118, 128, 0.24);
            --accent: #0A84FF;
            --accent-pf: #30D158;
            --accent-danger: #FF453A;
            --accent-warning: #FF9F0A;
            --text-main: #FFFFFF;
            --text-sec: rgba(235, 235, 245, 0.6);
            --glass-blur: blur(25px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top, 20px) 16px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER & LOGO --- */
        .app-header { width: 100%; max-width: 800px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; padding-top: 10px; }
        .logo { height: 40px; object-fit: contain; filter: invert(1) brightness(2); }
        .admin-btn-icon { position: absolute; right: 0; font-size: 22px; color: var(--text-sec); background: none; border: none; cursor: pointer; padding: 10px; transition: 0.2s; }
        .admin-btn-icon:active { transform: rotate(45deg); color: white; }

        /* --- CONTROLS --- */
        .controls {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px;
            margin-bottom: 24px; position: sticky; top: env(safe-area-inset-top, 10px); z-index: 100;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 10px 0 15px;
        }

        .segment-control { display: flex; background: var(--bg-search); border-radius: 9px; padding: 2px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 6px 0; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s ease; opacity: 0.8; }
        .tab-btn.active { background: #636366; opacity: 1; box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04); }

        .search-bar { width: 100%; padding: 10px 16px; border-radius: 10px; border: none; background: var(--bg-search); color: white; font-size: 17px; outline: none; transition: 0.2s; }
        .search-bar::placeholder { color: var(--text-sec); }
        .search-bar:focus { background: rgba(118, 118, 128, 0.4); }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-pill { background: var(--bg-search); color: var(--text-sec); border: none; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .filter-pill.active { background: var(--text-main); color: var(--bg-base); }

        /* --- CARDS --- */
        .content-container { width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; width: 100%; }

        .card { background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-radius: 20px; padding: 20px; cursor: pointer; transition: transform 0.2s, background 0.3s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .card:active { transform: scale(0.97); background: rgba(44, 44, 46, 0.9); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 20px; font-weight: 600; margin: 0; color: var(--text-main); letter-spacing: 0.3px; }
        .chevron { color: var(--text-sec); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 14px; }
        .card.open .chevron { transform: rotate(180deg); }
        .card-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-content-inner { overflow: hidden; }
        .card.open .card-content { grid-template-rows: 1fr; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); }

        .tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-sec); letter-spacing: 0.5px;}
        .tag.glass { background: rgba(10, 132, 255, 0.2); color: var(--accent); }
        .method { font-size: 15px; line-height: 1.4; color: var(--text-sec); margin-bottom: 12px; }
        ul { margin: 0 0 16px 0; padding-left: 20px; color: var(--text-main); font-size: 16px; line-height: 1.6; }
        li { margin-bottom: 6px; }

        /* ВОЗВРАЩАЕМ СТИЛИ КАЛЬКУЛЯТОРА ПФ */
        .pf-calculator { display: flex; align-items: center; gap: 12px; background: rgba(48, 209, 88, 0.1); border-radius: 12px; padding: 12px; margin-bottom: 16px; border: 1px solid rgba(48, 209, 88, 0.2);}
        .pf-calc-label { font-size: 14px; font-weight: 600; color: var(--accent-pf); }
        .pf-calc-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 8px; width: 80px; font-size: 16px; font-weight: bold; text-align: center; outline: none; transition: 0.2s; }
        .pf-calc-input:focus { border-color: var(--accent-pf); }
        .pf-calc-unit { font-size: 14px; color: var(--text-sec); }
        .ing-val { font-weight: bold; color: var(--accent-pf); }

        /* Forms & Buttons General */
        .input-apple { width: 100%; padding: 14px 16px; border-radius: 12px; border: none; background: var(--bg-elevated); color: white; font-size: 17px; outline: none; margin-bottom: 12px; }
        .input-apple::placeholder { color: var(--text-sec); }
        .btn-apple { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-apple:active { transform: scale(0.96); opacity: 0.8; }
        .btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--accent-danger); border-radius: 8px; padding: 8px 12px; font-weight: bold; border: none; }

        /* MODULES */
        #checklist-container, #orders-container, #admin-container { display: none; width: 100%; flex-direction: column; gap: 16px; }
        .cl-item, .order-card, .admin-item { background: var(--bg-elevated); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .order-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .cl-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-sec); display: flex; align-items: center; justify-content: center; }
        .cl-item.done .cl-checkbox { background: var(--accent); border-color: var(--accent); }
        .cl-item.done .cl-checkbox::after { content: "✓"; color: white; font-size: 14px; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px;}
        .modal-content { background: var(--bg-elevated); width: 100%; max-width: 340px; border-radius: 24px; padding: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.5px;}

    </style>
</head>
<body>

    <div class="app-header">
        <img src="/logo.png" alt="ТУГАЙ" class="logo" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';">
        <h1 id="text-logo" style="display:none; margin:0;">ТУГАЙ</h1>
        <button class="admin-btn-icon" onclick="openAdminAuth()">⚙️</button>
    </div>
    
    <div class="controls">
        <div class="segment-control">
            <button id="btn-drinks" class="tab-btn active" onclick="switchTab('drinks')">Напитки</button>
            <button id="btn-pf" class="tab-btn" onclick="switchTab('pf')">ПФ</button>
            <button id="btn-checklist" class="tab-btn" onclick="switchTab('checklist')">Чек-лист</button>
            <button id="btn-orders" class="tab-btn" onclick="switchTab('orders')">Заявки</button>
        </div>
        <input type="text" id="search" class="search-bar" placeholder="Поиск (название, состав)..." onkeyup="filterCards()">
        
        <div class="filters" id="drink-filters">
            <div class="filter-pill active" onclick="setFilter('all', this)">Все</div>
            <div class="filter-pill" onclick="setFilter('cocktail', this)">Коктейли</div>
            <div class="filter-pill" onclick="setFilter('lemonade', this)">Лимонады</div>
            <div class="filter-pill" onclick="setFilter('smoothie', this)">Смузи</div>
            <div class="filter-pill" onclick="setFilter('nonalk', this)">Б/А</div>
            <div class="filter-pill" onclick="setFilter('tea_coffee', this)">Чай / Кофе</div>
        </div>
    </div>

    <div class="content-container">
        <!-- ТТК Контейнер -->
        <div class="grid" id="cards-container"></div>

        <!-- Чек-лист Контейнер -->
        <div id="checklist-container">
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-task" class="input-apple" style="margin:0;" placeholder="Добавить задачу..." onkeypress="if(event.key === 'Enter') addTask()">
                <button class="btn-apple" style="width:auto; padding:0 20px;" onclick="addTask()">+</button>
            </div>
            <div id="task-list" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;"></div>
        </div>

        <!-- Заявки Контейнер -->
        <div id="orders-container">
            <button class="btn-apple" style="background:var(--accent-warning); color:black;" onclick="sendOrdersNow()">Отправить закупщику (Telegram)</button>
            
            <div style="background:var(--bg-elevated); padding:20px; border-radius:20px;">
                <h3 style="margin:0 0 15px 0;">Добавить позицию</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="ord-name" class="input-apple" placeholder="Что нужно? (Мята)">
                    <input type="text" id="ord-qty" class="input-apple" style="width:100px;" placeholder="Кол-во">
                </div>
                <input type="text" id="ord-comment" class="input-apple" placeholder="Комментарий (необязательно)">
                <button class="btn-apple" style="background:var(--accent-pf); color:black;" onclick="submitOrder()">Добавить в список</button>
            </div>
            <div id="active-orders-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <!-- АДМИН ПАНЕЛЬ -->
        <div id="admin-container">
            <h2 style="margin-top:0;">Управление меню</h2>
            <div style="background:var(--bg-elevated); padding:20px; border-radius:20px; margin-bottom:20px;">
                <h3 style="margin-top:0;">Добавить напиток/ПФ</h3>
                <input type="text" id="adm-title" class="input-apple" placeholder="Название (напр. Апероль)">
                <select id="adm-cat" class="input-apple" style="appearance: none;">
                    <option value="cocktail">Коктейль (Вкладка Напитки)</option>
                    <option value="lemonade">Лимонад (Вкладка Напитки)</option>
                    <option value="smoothie">Смузи (Вкладка Напитки)</option>
                    <option value="tea_coffee">Чай/Кофе (Вкладка Напитки)</option>
                    <option value="nonalk">Б/А (Вкладка Напитки)</option>
                    <option value="pf">Простая Заготовка (Вкладка ПФ)</option>
                </select>
                <textarea id="adm-method" class="input-apple" rows="2" placeholder="Метод приготовления..."></textarea>
                <input type="text" id="adm-glass" class="input-apple" placeholder="Тип бокала (Рокс, Хайбол...)">
                <p style="color:var(--text-sec); font-size:13px; margin-bottom:5px;">Ингредиенты (каждый с новой строки):</p>
                <textarea id="adm-ing" class="input-apple" rows="4" placeholder="Апероль - 40мл&#10;Просекко - 80мл"></textarea>
                <button class="btn-apple" onclick="addMenuItem()">Сохранить в базу</button>
                <p style="color:var(--text-sec); font-size:12px; margin-top:15px; text-align:center;">* Сложные ПФки с калькулятором добавляются только через код разработчика.</p>
            </div>
            <div id="admin-items-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>

    <!-- Модалки -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <div class="modal-title">Вход для барменов</div>
            <input type="text" id="author-name-input" class="input-apple" placeholder="Ваше Имя (Бармен)">
            <input type="password" id="author-password-input" class="input-apple" placeholder="Пароль (12345678)">
            <button class="btn-apple" onclick="saveAuthorName()">Войти</button>
        </div>
    </div>
    <div class="modal-overlay" id="admin-auth-modal">
        <div class="modal-content">
            <div class="modal-title">Доступ управляющего</div>
            <input type="password" id="admin-password-input" class="input-apple" placeholder="Пароль">
            <button class="btn-apple" onclick="verifyAdmin()">Войти в админку</button>
            <button class="btn-apple" style="background:transparent; color:var(--text-sec); margin-top:10px;" onclick="closeAdminAuth()">Отмена</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin; 
        let ttkData = []; 
        let currentTab = 'drinks';
        let currentFilter = 'all';
        let orderSyncInterval = null;

        async function loadMenuFromDB() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/menu`);
                ttkData = await res.json();
                if(currentTab === 'drinks' || currentTab === 'pf') renderCards();
                if(currentTab === 'admin') renderAdminList();
            } catch (e) { console.error("Ошибка загрузки меню", e); }
        }

        window.onload = () => { loadMenuFromDB(); };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`btn-${tab}`)) document.getElementById(`btn-${tab}`).classList.add('active');

            ['cards', 'checklist', 'orders', 'admin'].forEach(id => {
                document.getElementById(`${id}-container`).style.display = 'none';
            });

            if(tab === 'drinks' || tab === 'pf') {
                document.getElementById('cards-container').style.display = 'grid';
                document.getElementById('search').style.display = 'block';
                document.getElementById('drink-filters').style.display = tab === 'drinks' ? 'flex' : 'none';
                renderCards();
            } else if (tab === 'orders') {
                document.getElementById('search').style.display = 'none';
                document.getElementById('drink-filters').style.display = 'none';
                document.getElementById('orders-container').style.display = 'flex';
                checkAuthorAndLoadOrders();
            } else if (tab === 'checklist') {
                document.getElementById('search').style.display = 'none';
                document.getElementById('drink-filters').style.display = 'none';
                document.getElementById('checklist-container').style.display = 'flex';
                renderTasks();
            } else if (tab === 'admin') {
                document.getElementById('search').style.display = 'none';
                document.getElementById('drink-filters').style.display = 'none';
                document.getElementById('admin-container').style.display = 'flex';
                renderAdminList();
            }
        }

        function setFilter(filter, el) { currentFilter = filter; document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); renderCards(); }
        function filterCards() { renderCards(); }
        function toggleCard(cardElement) { cardElement.classList.toggle('open'); }

        // --- ВОЗВРАЩАЕМ ЛОГИКУ КАЛЬКУЛЯТОРА ПФ ---
        function recalculatePf(cardId, baseYield) {
            const input = document.getElementById(`calc-input-${cardId}`);
            let targetYield = parseFloat(input.value);
            if (isNaN(targetYield) || targetYield <= 0) targetYield = baseYield;

            const ratio = targetYield / baseYield;
            const ingredientSpans = document.querySelectorAll(`.ing-amount-${cardId}`);
            ingredientSpans.forEach(span => {
                const baseAmount = parseFloat(span.dataset.base);
                let newAmount = baseAmount * ratio;
                newAmount = Number.isInteger(newAmount) ? newAmount : newAmount.toFixed(1);
                span.innerText = newAmount;
            });
        }

        // --- ПОЛНЫЙ РЕНДЕР С УЧЕТОМ КАЛЬКУЛЯТОРА ---
        function renderCards() {
            const container = document.getElementById('cards-container');
            const searchText = document.getElementById('search').value.toLowerCase();
            container.innerHTML = ''; 

            const filteredData = ttkData.filter(item => {
                const matchesTab = item.tab === currentTab;
                const matchesCategory = currentTab === 'drinks' ? (currentFilter === 'all' || item.category === currentFilter) : true;
                let searchString = item.title.toLowerCase();
                if (item.ingredients) searchString += ' ' + item.ingredients.join(' ').toLowerCase();
                if (item.calcIngredients) searchString += ' ' + item.calcIngredients.map(i => i.name).join(' ').toLowerCase();
                return matchesTab && matchesCategory && searchString.includes(searchText);
            });

            if (filteredData.length === 0) {
                container.innerHTML = '<p style="color:var(--text-sec); text-align:center; width:100%;">Пусто</p>'; return;
            }

            filteredData.forEach(item => {
                let tagsHtml = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
                if (item.glass) tagsHtml += `<span class="tag glass">🍸 ${item.glass}</span>`;

                let innerContent = '';

                // ЕСЛИ ЕСТЬ ДАННЫЕ КАЛЬКУЛЯТОРА
                if (item.calcIngredients && item.calcIngredients.length > 0) {
                    const ingHtml = item.calcIngredients.map(ing => {
                        return `<li>${ing.name} — <span class="ing-val ing-amount-${item.id}" data-base="${ing.amount}">${ing.amount}</span> ${ing.unit}</li>`;
                    }).join('');

                    innerContent = `
                        <div class="pf-calculator" onclick="event.stopPropagation()">
                            <div class="pf-calc-label">Получить:</div>
                            <input type="number" id="calc-input-${item.id}" class="pf-calc-input" value="${item.baseYield}" oninput="recalculatePf(${item.id}, ${item.baseYield})">
                            <div class="pf-calc-unit">${item.unit}</div>
                        </div>
                        <div class="method"><strong>Метод:</strong> ${item.method}</div>
                        <ul>${ingHtml}</ul>
                    `;
                } else {
                    // ОБЫЧНЫЙ НАПИТОК
                    const ingHtml = item.ingredients.map(i => `<li>${i}</li>`).join('');
                    innerContent = `
                        <div class="tags">${tagsHtml}</div>
                        <div class="method"><strong>Метод:</strong> ${item.method}</div>
                        <ul>${ingHtml}</ul>
                    `;
                }

                const cardHtml = `
                    <div class="card" onclick="toggleCard(this)">
                        <div class="card-header">
                            <h3 class="card-title">${item.title}</h3>
                            <span class="chevron">▼</span>
                        </div>
                        <div class="card-content">
                            <div class="card-content-inner">
                                ${item.calcIngredients && item.calcIngredients.length > 0 ? `<div class="tags">${tagsHtml}</div>` : ''}
                                ${innerContent}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // === ЧЕК-ЛИСТ ===
        let tasks = JSON.parse(localStorage.getItem('tugai_tasks')) || [];
        function saveTasks() { localStorage.setItem('tugai_tasks', JSON.stringify(tasks)); }
        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = `cl-item ${task.done ? 'done' : ''}`;
                item.innerHTML = `
                    <div style="display:flex; gap:10px; align-items:center; flex:1;" onclick="toggleTask(${index})">
                        <div class="cl-checkbox"></div><div style="font-size:17px;">${task.text}</div>
                    </div>
                    <button class="btn-danger" onclick="deleteTask(${index})">✕</button>`;
                list.appendChild(item);
            });
        }
        function addTask() {
            const input = document.getElementById('new-task');
            if (input.value.trim()) { tasks.unshift({ text: input.value.trim(), done: false }); input.value = ''; saveTasks(); renderTasks(); }
        }
        function toggleTask(index) { tasks[index].done = !tasks[index].done; saveTasks(); renderTasks(); }
        function deleteTask(index) { tasks.splice(index, 1); saveTasks(); renderTasks(); }

        // === ЗАЯВКИ ===
        function checkAuthorAndLoadOrders() {
            if (!localStorage.getItem('tugai_author_name')) { document.getElementById('auth-modal').style.display = 'flex'; } 
            else {
                fetchOrders();
                if (orderSyncInterval) clearInterval(orderSyncInterval);
                orderSyncInterval = setInterval(() => { if (currentTab === 'orders') fetchOrders(); }, 5000); 
            }
        }
        function saveAuthorName() {
            const name = document.getElementById('author-name-input').value.trim();
            const pass = document.getElementById('author-password-input').value.trim();
            if (name.length < 2) return alert("Введите имя");
            if (pass !== "12345678") return alert("Неверный пароль!");
            localStorage.setItem('tugai_author_name', name);
            document.getElementById('auth-modal').style.display = 'none';
            checkAuthorAndLoadOrders();
        }
        async function fetchOrders() {
            const res = await fetch(`${API_BASE_URL}/api/get_orders`);
            const orders = await res.json();
            const listEl = document.getElementById('active-orders-list');
            listEl.innerHTML = orders.length === 0 ? '<p style="color:var(--text-sec); text-align:center;">Пусто</p>' : '';
            orders.forEach(ord => {
                listEl.insertAdjacentHTML('beforeend', `
                    <div class="order-card">
                        <div><div class="order-title">${ord.item_name} <span style="color:var(--accent-pf);">— ${ord.quantity}</span></div><div style="font-size:14px; color:var(--text-sec)">${ord.comment}</div></div>
                        <button class="btn-danger" onclick="removeOrder(${ord.id})">Удалить</button>
                    </div>`);
            });
        }
        async function submitOrder() {
            const payload = { item_name: document.getElementById('ord-name').value.trim(), quantity: document.getElementById('ord-qty').value.trim(), comment: document.getElementById('ord-comment').value.trim(), author_name: localStorage.getItem('tugai_author_name') };
            await fetch(`${API_BASE_URL}/api/add_order`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            document.getElementById('ord-name').value = ''; document.getElementById('ord-qty').value = ''; fetchOrders();
        }
        async function removeOrder(id) { await fetch(`${API_BASE_URL}/api/delete_order/${id}`, { method: 'DELETE' }); fetchOrders(); }
        async function sendOrdersNow() {
            if(confirm("Отправить закупщику?")) { await fetch(`${API_BASE_URL}/api/send_now`, { method: 'POST' }); alert("Отправлено!"); fetchOrders(); }
        }

        // === АДМИНКА ===
        function openAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'flex'; }
        function closeAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'none'; }
        function verifyAdmin() {
            if(document.getElementById('admin-password-input').value === "admin2024") {
                document.getElementById('admin-auth-modal').style.display = 'none'; switchTab('admin');
            } else { alert("Неверный пароль администратора!"); }
        }
        function renderAdminList() {
            const list = document.getElementById('admin-items-list');
            list.innerHTML = '';
            ttkData.forEach(item => {
                list.insertAdjacentHTML('beforeend', `
                    <div class="admin-item">
                        <div style="font-weight:600;">${item.title} <span style="font-size:12px; color:var(--text-sec); font-weight:normal;">(${item.tab})</span></div>
                        <button class="btn-danger" onclick="deleteMenuItem(${item.id})">Удалить</button>
                    </div>`);
            });
        }
        async function addMenuItem() {
            const title = document.getElementById('adm-title').value.trim();
            const cat = document.getElementById('adm-cat').value;
            const method = document.getElementById('adm-method').value.trim();
            const glass = document.getElementById('adm-glass').value.trim();
            const ingArray = document.getElementById('adm-ing').value.split('\n').map(i => i.trim()).filter(i => i !== "");
            if(!title) return alert("Введите название!");

            const payload = { tab: cat === 'pf' ? 'pf' : 'drinks', category: cat, title: title, method: method, glass: glass, tags: "[]", ingredients: JSON.stringify(ingArray), baseYield: 0, unit: "", calcIngredients: "[]" };
            const btn = event.target; btn.innerText = "⏳ Сохраняем...";
            try {
                await fetch(`${API_BASE_URL}/api/menu`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                alert("Добавлено!"); document.getElementById('adm-title').value = ''; document.getElementById('adm-method').value = ''; document.getElementById('adm-ing').value = ''; loadMenuFromDB();
            } catch (e) { alert("Ошибка сервера"); } finally { btn.innerText = "Сохранить в базу"; }
        }
        async function deleteMenuItem(id) {
            if(confirm("Точно удалить позицию из меню навсегда?")) { await fetch(`${API_BASE_URL}/api/menu/${id}`, { method: 'DELETE' }); loadMenuFromDB(); }
        }
    </script>
</body>
</html>
